<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>白六 YouTube 彈幕分享器</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #00b900; --yt-red: #ff0000; --bg: #f4f7f9; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: var(--bg); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 編輯器介面 */
        #editorUI { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        
        /* 播放器介面 */
        #playerUI { display: none; width: 100vw; height: 100vh; background: #000; position: fixed; top: 0; left: 0; z-index: 1000; }
        .full-video { width: 100%; height: 100%; border: none; }
        #danmakuLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1010; overflow: hidden; }
        .danmaku { position: absolute; color: white; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); white-space: nowrap; font-size: 24px; will-change: transform; }

        h2 { color: var(--yt-red); text-align: center; margin: 0 0 20px 0; font-size: 22px; }
        .field { margin-bottom: 18px; width: 100%; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #444; }
        input, textarea { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--yt-red); }
        
        .preview-img-container { width: 100%; border-radius: 12px; overflow: hidden; margin-top: 10px; background: #eee; aspect-ratio: 16/9; display: none; }
        #ytThumb { width: 100%; height: 100%; object-fit: cover; }

        .btn-send { width: 100%; padding: 16px; background: var(--yt-red); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 12px rgba(255,0,0,0.2); }
        .btn-send:active { transform: scale(0.98); }
        .status-msg { font-size: 11px; color: #bbb; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div id="playerUI">
    <iframe id="ytPlayer" class="full-video" allow="autoplay; encrypted-media"></iframe>
    <div id="danmakuLayer"></div>
</div>

<div id="editorUI">
    <div class="card">
        <h2>🎥 影片分享製作</h2>
        
        <div class="field">
            <label>1. 貼上 YouTube 網址</label>
            <input type="text" id="ytUrl" placeholder="https://youtu.be/..." oninput="handleUrlChange()">
            <div id="thumbContainer" class="preview-img-container">
                <img id="ytThumb">
            </div>
        </div>

        <div class="field">
            <label>2. 按鈕文字</label>
            <input type="text" id="btnLabel" value="播放影片" placeholder="例如：點我播放">
        </div>

        <div class="field">
            <label>3. 彈幕內容 (以分號 ; 隔開)</label>
            <textarea id="danmakuText" rows="3">太好聽了！; 𓃥 白六推薦; 666666; 質感滿分; 🎥🎥🎥; 這畫面太美</textarea>
        </div>

        <button class="btn-send" onclick="sendFlex()">選擇好友並發送</button>
        <p id="status" class="status-msg">LIFF 初始化中...</p>
    </div>
</div>

<script>
    const LIFF_ID = "2009222789-ouCqL9JS";
    let currentYtId = "";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            document.getElementById('status').innerText = "LIFF 已就緒";

            const params = new URLSearchParams(window.location.search);
            const v = params.get('v');
            const d = params.get('d'); 

            if (v) {
                startPlayer(v, d);
            } else {
                document.getElementById('editorUI').style.display = 'flex';
            }
        } catch (e) { console.error(e); }
    }

    function handleUrlChange() {
        const url = document.getElementById('ytUrl').value;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        if (match && match[2].length == 11) {
            currentYtId = match[2];
            const thumb = document.getElementById('ytThumb');
            const container = document.getElementById('thumbContainer');
            // 使用 hqdefault 確保穩定顯示
            thumb.src = `https://img.youtube.com/vi/${currentYtId}/hqdefault.jpg`;
            container.style.display = 'block';
        }
    }

    function startPlayer(vId, dText) {
        document.getElementById('editorUI').style.display = 'none';
        document.getElementById('playerUI').style.display = 'block';
        // 必須加上 mute=1 才能自動播放
        document.getElementById('ytPlayer').src = `https://www.youtube.com/embed/${vId}?autoplay=1&mute=1&rel=0&showinfo=0`;

        if (dText) {
            const danmakus = decodeURIComponent(dText).split(';');
            setInterval(() => {
                const text = danmakus[Math.floor(Math.random() * danmakus.length)];
                if(text.trim()) createDanmaku(text);
            }, 1500);
        }
    }

    function createDanmaku(text) {
        const layer = document.getElementById('danmakuLayer');
        const el = document.createElement('div');
        el.className = 'danmaku';
        el.innerText = text.trim();
        el.style.top = (Math.random() * 75 + 5) + '%';
        el.style.left = '100%';
        layer.appendChild(el);

        const duration = 5000 + Math.random() * 3000;
        const anim = el.animate([
            { transform: 'translateX(0)' },
            { transform: `translateX(-${window.innerWidth + 1000}px)` }
        ], { duration: duration, easing: 'linear' });

        anim.onfinish = () => el.remove();
    }

    async function sendFlex() {
        if (!currentYtId) { alert("請先輸入有效的 YouTube 網址並確認出現預覽圖"); return; }
        
        const btnText = document.getElementById('btnLabel').value || "播放影片";
        const dText = encodeURIComponent(document.getElementById('danmakuText').value);
        const shareLink = `https://liff.line.me/${LIFF_ID}?v=${currentYtId}&d=${dText}`;
        const thumbUrl = `https://img.youtube.com/vi/${currentYtId}/hqdefault.jpg`;

        const flexMsg = [{
            type: "flex",
            altText: "🎥 分享影片給你",
            contents: {
                "type": "bubble",
                "hero": {
                    "type": "image",
                    "url": thumbUrl,
                    "size": "full",
                    "aspectRatio": "16:9",
                    "aspectMode": "cover",
                    "action": { "type": "uri", "uri": shareLink }
                },
                "footer": {
                    "type": "box",
                    "layout": "vertical",
                    "contents": [
                        {
                            "type": "button",
                            "style": "primary",
                            "color": "#ff0000",
                            "height": "md",
                            "action": {
                                "type": "uri",
                                "label": btnText,
                                "uri": shareLink
                            }
                        }
                    ]
                }
            }
        }];

        try {
            const res = await liff.shareTargetPicker(flexMsg);
            if (res) liff.closeWindow();
        } catch (e) { alert("分享失敗，請檢查權限: " + e.message); }
    }

    window.onload = init;
</script>

</body>
</html>
