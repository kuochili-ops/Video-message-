<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>白六 YouTube 全功能分享器</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #00b900; --yt-red: #ff0000; --bg: #f4f7f9; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        #editorUI { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        
        #playerUI { display: none; width: 100vw; height: 100vh; background: #000; position: fixed; top: 0; left: 0; z-index: 1000; overflow: hidden; }
        .full-video { width: 100%; height: 100%; border: none; }
        #danmakuLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1010; overflow: hidden; }
        .danmaku { position: absolute; font-weight: bold; white-space: nowrap; will-change: transform; }

        /* 特效元件 */
        .sakura { position: absolute; background: #ffb6c1; border-radius: 100% 0 100% 0; opacity: 0.6; pointer-events: none; }
        .sparkle { position: absolute; border-radius: 50%; background: white; pointer-events: none; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            100% { transform: translate(0); }
        }
        .mode-glitch { animation: glitch 0.2s infinite; filter: hue-rotate(90deg); }

        h2 { color: var(--yt-red); text-align: center; margin-bottom: 20px; }
        .field { margin-bottom: 15px; width: 100%; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #666; }
        input, textarea, select { width: 100%; padding: 10px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        .preview-img-container { width: 100%; border-radius: 12px; overflow: hidden; margin-top: 10px; background: #eee; aspect-ratio: 16/9; display: none; }
        #ytThumb { width: 100%; height: 100%; object-fit: cover; }
        .btn-send { width: 100%; padding: 16px; background: var(--yt-red); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="playerUI">
    <div id="videoContainer" style="width:100%; height:100%;">
        <iframe id="ytPlayer" class="full-video" allow="autoplay; encrypted-media"></iframe>
    </div>
    <div id="danmakuLayer"></div>
</div>

<div id="editorUI">
    <div class="card">
        <h2>🎥 影片 / 直播分享器</h2>
        
        <div class="field">
            <label>貼上網址 (支援 一般/Shorts/Live)</label>
            <input type="text" id="ytUrl" placeholder="https://www.youtube.com/live/..." oninput="handleUrlChange()">
            <div id="thumbContainer" class="preview-img-container"><img id="ytThumb"></div>
        </div>

        <div class="field">
            <label>選擇視覺特效</label>
            <select id="vMode">
                <option value="none">無特效</option>
                <option value="romance">🌸 浪漫模式</option>
                <option value="glitch">⚡ 電音模式</option>
                <option value="star">✨ 星空模式</option>
            </select>
        </div>

        <div class="field">
            <label>按鈕文字</label>
            <input type="text" id="btnLabel" value="觀看影片">
        </div>

        <div class="field">
            <label>彈幕內容 (以分號 ; 隔開)</label>
            <textarea id="danmakuText" rows="2">這直播太強了！; 𓃥 白六推薦; 666666; 質感滿分</textarea>
        </div>

        <button class="btn-send" onclick="sendFlex()">選擇好友發送</button>
    </div>
</div>

<script>
    const LIFF_ID = "2009222789-ouCqL9JS";
    let currentYtId = "";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            const params = new URLSearchParams(window.location.search);
            const v = params.get('v');
            if (v) {
                if (params.get('mode') === 'edit') {
                    fillEditor(params);
                } else {
                    startPlayer(params);
                }
            } else {
                document.getElementById('editorUI').style.display = 'flex';
            }
        } catch (e) { console.error(e); }
    }

    function fillEditor(p) {
        currentYtId = p.get('v');
        document.getElementById('ytUrl').value = `https://www.youtube.com/watch?v=${currentYtId}`;
        document.getElementById('vMode').value = p.get('m') || 'none';
        document.getElementById('btnLabel').value = p.get('b') || '觀看影片';
        document.getElementById('danmakuText').value = decodeURIComponent(p.get('d') || '');
        handleUrlChange();
        document.getElementById('editorUI').style.display = 'flex';
    }

    // 更新後的網址解析邏輯：支援 一般, Shorts, Live
    function handleUrlChange() {
        const url = document.getElementById('ytUrl').value.trim();
        let id = "";
        
        if (url.includes("shorts/")) {
            id = url.split("shorts/")[1].split(/[?&]/)[0];
        } else if (url.includes("live/")) {
            // 處理直播連結格式
            id = url.split("live/")[1].split(/[?&]/)[0];
        } else {
            const m = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            if (m && m[2].length == 11) id = m[2];
        }

        if (id) {
            currentYtId = id;
            document.getElementById('ytThumb').src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
            document.getElementById('thumbContainer').style.display = 'block';
        }
    }

    function startPlayer(p) {
        document.getElementById('editorUI').style.display = 'none';
        document.getElementById('playerUI').style.display = 'block';
        const vId = p.get('v');
        const mode = p.get('m');
        document.getElementById('ytPlayer').src = `https://www.youtube.com/embed/${vId}?autoplay=1&mute=1&rel=0`;

        if (mode === 'romance') setInterval(createSakura, 500);
        if (mode === 'star') setInterval(createStar, 300);
        if (mode === 'glitch') document.getElementById('videoContainer').classList.add('mode-glitch');

        const dText = p.get('d');
        if (dText) {
            const danmakus = decodeURIComponent(dText).split(';');
            setInterval(() => {
                const text = danmakus[Math.floor(Math.random() * danmakus.length)];
                if(text && text.trim()) createDanmaku(text.trim());
            }, 1200);
        }
    }

    function createSakura() {
        const layer = document.getElementById('danmakuLayer');
        const s = document.createElement('div');
        s.className = 'sakura';
        const size = Math.random() * 10 + 5 + 'px';
        s.style.width = size; s.style.height = size;
        s.style.left = Math.random() * 100 + '%'; s.style.top = '-20px';
        layer.appendChild(s);
        s.animate([{ transform: `translate(0,0) rotate(0deg)`, opacity: 0.6 }, { transform: `translate(${Math.random()*100-50}px, 100vh) rotate(720deg)`, opacity: 0 }], { duration: 5000 }).onfinish = () => s.remove();
    }

    function createStar() {
        const layer = document.getElementById('danmakuLayer');
        const star = document.createElement('div');
        star.className = 'sparkle';
        const size = Math.random() * 4 + 'px';
        star.style.width = size; star.style.height = size;
        star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
        star.style.boxShadow = '0 0 10px white';
        layer.appendChild(star);
        star.animate([{ opacity: 0, scale: 0 }, { opacity: 1, scale: 1.5 }, { opacity: 0, scale: 0 }], { duration: 2000 }).onfinish = () => star.remove();
    }

    function createDanmaku(text) {
        const layer = document.getElementById('danmakuLayer');
        const el = document.createElement('div');
        el.className = 'danmaku';
        el.innerText = text;
        el.style.color = 'white';
        el.style.fontSize = '24px';
        el.style.textShadow = '2px 2px 4px rgba(0,0,0,0.8)';
        el.style.top = (Math.random() * 80 + 5) + '%'; el.style.left = '100%';
        layer.appendChild(el);
        el.animate([{ transform: 'translateX(0)' }, { transform: `translateX(-${window.innerWidth + 1200}px)` }], { duration: 8000, easing: 'linear' }).onfinish = () => el.remove();
    }

    async function sendFlex() {
        if (!currentYtId) { alert("請貼上網址"); return; }
        const mode = document.getElementById('vMode').value;
        const b = encodeURIComponent(document.getElementById('btnLabel').value);
        const d = encodeURIComponent(document.getElementById('danmakuText').value);
        
        const params = `v=${currentYtId}&m=${mode}&b=${b}&d=${d}`;
        const playLink = `https://liff.line.me/${LIFF_ID}?${params}`;
        const editLink = `https://liff.line.me/${LIFF_ID}?${params}&mode=edit`;

        const flexMsg = [{
            type: "flex",
            altText: "🎥 專屬影片分享",
            contents: {
                "type": "bubble",
                "hero": {
                    "type": "image", "url": `https://img.youtube.com/vi/${currentYtId}/hqdefault.jpg`,
                    "size": "full", "aspectRatio": "16:9", "aspectMode": "cover",
                    "action": { "type": "uri", "uri": playLink }
                },
                "footer": {
                    "type": "box", "layout": "horizontal", "spacing": "md", "contents": [
                        { "type": "button", "style": "primary", "color": "#ff0000", "height": "sm", "action": { "type": "uri", "label": decodeURIComponent(b), "uri": playLink } },
                        { "type": "button", "style": "secondary", "color": "#888888", "height": "sm", "action": { "type": "uri", "label": "轉發分享", "uri": editLink } }
                    ]
                }
            }
        }];
        try { await liff.shareTargetPicker(flexMsg); liff.closeWindow(); } catch (e) { alert("發送失敗"); }
    }
    window.onload = init;
</script>
</body>
</html>
