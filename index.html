<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>白六 YouTube 彈幕分享器</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #00b900; --yt-red: #ff0000; --bg: #f4f7f9; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* 編輯器 UI */
        #editorUI { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        
        /* 播放器 UI */
        #playerUI { display: none; width: 100vw; height: 100vh; background: #000; position: fixed; top: 0; left: 0; z-index: 1000; }
        .full-video { width: 100%; height: 100%; border: none; }
        #danmakuLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1010; overflow: hidden; }
        .danmaku { position: absolute; font-weight: bold; white-space: nowrap; will-change: transform; }

        h2 { color: var(--yt-red); text-align: center; margin: 0 0 20px 0; }
        .field { margin-bottom: 15px; width: 100%; }
        .flex-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .flex-item { flex: 1; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #666; }
        input, textarea, select { width: 100%; padding: 10px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; }
        
        .preview-img-container { width: 100%; border-radius: 12px; overflow: hidden; margin-top: 10px; background: #eee; aspect-ratio: 16/9; display: none; }
        #ytThumb { width: 100%; height: 100%; object-fit: cover; }

        .btn-send { width: 100%; padding: 16px; background: var(--yt-red); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div id="playerUI">
    <iframe id="ytPlayer" class="full-video" allow="autoplay; encrypted-media"></iframe>
    <div id="danmakuLayer"></div>
</div>

<div id="editorUI">
    <div class="card">
        <h2>🎥 影片彈幕製作</h2>
        
        <div class="field">
            <label>YouTube / Shorts 網址</label>
            <input type="text" id="ytUrl" placeholder="貼上網址..." oninput="handleUrlChange()">
            <div id="thumbContainer" class="preview-img-container"><img id="ytThumb"></div>
        </div>

        <div class="field">
            <label>按鈕文字</label>
            <input type="text" id="btnLabel" value="播放影片">
        </div>

        <hr>

        <div class="field">
            <label>彈幕內容 (以分號 ; 隔開)</label>
            <textarea id="danmakuText" rows="2">太帥了！; 𓃥 白六推薦; 666666; 質感滿分</textarea>
        </div>

        <div class="flex-row">
            <div class="flex-item">
                <label>彈幕顏色</label>
                <input type="color" id="dColor" value="#ffffff">
            </div>
            <div class="flex-item">
                <label>字體大小</label>
                <select id="dSize">
                    <option value="18px">小</option>
                    <option value="24px" selected>中</option>
                    <option value="32px">大</option>
                    <option value="40px">特大</option>
                </select>
            </div>
            <div class="flex-item">
                <label>陰影</label>
                <select id="dShadow">
                    <option value="2px 2px 4px rgba(0,0,0,0.8)">標準</option>
                    <option value="0 0 8px rgba(0,0,0,1)">深沈</option>
                    <option value="none">無</option>
                </select>
            </div>
        </div>

        <button class="btn-send" onclick="sendFlex()">選擇好友發送</button>
    </div>
</div>

<script>
    const LIFF_ID = "2009222789-ouCqL9JS";
    let currentYtId = "";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            const params = new URLSearchParams(window.location.search);
            const v = params.get('v');
            const editMode = params.get('mode') === 'edit';

            // 取得所有參數並填入編輯器（不論是播放還是轉發，都先解析參數）
            if (v) {
                currentYtId = v;
                if (params.get('b')) document.getElementById('btnLabel').value = params.get('b');
                if (params.get('d')) document.getElementById('danmakuText').value = decodeURIComponent(params.get('d'));
                if (params.get('c')) document.getElementById('dColor').value = decodeURIComponent(params.get('c'));
                if (params.get('s')) document.getElementById('dSize').value = params.get('s');
                if (params.get('sh')) document.getElementById('dShadow').value = decodeURIComponent(params.get('sh'));
                
                // 如果是轉發模式或是純編輯模式
                if (editMode || !v) {
                    document.getElementById('ytUrl').value = `https://www.youtube.com/watch?v=${v}`;
                    handleUrlChange();
                    document.getElementById('editorUI').style.display = 'flex';
                } else {
                    // 播放模式
                    startPlayer(v, params.get('d'), params.get('c'), params.get('s'), params.get('sh'));
                }
            } else {
                document.getElementById('editorUI').style.display = 'flex';
            }
        } catch (e) { console.error(e); }
    }

    function handleUrlChange() {
        const url = document.getElementById('ytUrl').value.trim();
        let videoId = "";
        if (url.includes("shorts/")) {
            videoId = url.split("shorts/")[1].split(/[?&]/)[0];
        } else {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            if (match && match[2].length == 11) videoId = match[2];
        }
        if (videoId) {
            currentYtId = videoId;
            document.getElementById('ytThumb').src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
            document.getElementById('thumbContainer').style.display = 'block';
        }
    }

    function startPlayer(vId, dText, color, size, shadow) {
        document.getElementById('editorUI').style.display = 'none';
        document.getElementById('playerUI').style.display = 'block';
        document.getElementById('ytPlayer').src = `https://www.youtube.com/embed/${vId}?autoplay=1&mute=1&rel=0`;

        if (dText) {
            const colorVal = color ? decodeURIComponent(color) : '#ffffff';
            const sizeVal = size || '24px';
            const shadowVal = shadow ? decodeURIComponent(shadow) : '2px 2px 4px rgba(0,0,0,0.8)';
            const danmakus = decodeURIComponent(dText).split(';');
            setInterval(() => {
                const text = danmakus[Math.floor(Math.random() * danmakus.length)];
                if(text && text.trim()) createDanmaku(text.trim(), colorVal, sizeVal, shadowVal);
            }, 1200);
        }
    }

    function createDanmaku(text, color, size, shadow) {
        const layer = document.getElementById('danmakuLayer');
        const el = document.createElement('div');
        el.className = 'danmaku';
        el.innerText = text;
        el.style.color = color;
        el.style.fontSize = size;
        el.style.textShadow = shadow;
        el.style.top = (Math.random() * 80 + 5) + '%';
        el.style.left = '100%';
        layer.appendChild(el);
        const anim = el.animate([{ transform: 'translateX(0)' }, { transform: `translateX(-${window.innerWidth + 1200}px)` }], { duration: 6000 + Math.random() * 2000, easing: 'linear' });
        anim.onfinish = () => el.remove();
    }

    async function sendFlex() {
        if (!currentYtId) { alert("請貼上影片網址"); return; }
        
        const btnLabel = document.getElementById('btnLabel').value || "播放影片";
        const dText = encodeURIComponent(document.getElementById('danmakuText').value);
        const dColor = encodeURIComponent(document.getElementById('dColor').value);
        const dSize = document.getElementById('dSize').value;
        const dShadow = encodeURIComponent(document.getElementById('dShadow').value);

        // 基本參數字串
        const baseParams = `v=${currentYtId}&d=${dText}&c=${dColor}&s=${dSize}&sh=${dShadow}&b=${encodeURIComponent(btnLabel)}`;
        
        const playLink = `https://liff.line.me/${LIFF_ID}?${baseParams}`;
        const shareLink = `https://liff.line.me/${LIFF_ID}?${baseParams}&mode=edit`;

        const flexMsg = [{
            type: "flex",
            altText: "🎥 專屬彈幕影片分享",
            contents: {
                "type": "bubble",
                "hero": {
                    "type": "image",
                    "url": `https://img.youtube.com/vi/${currentYtId}/hqdefault.jpg`,
                    "size": "full", "aspectRatio": "16:9", "aspectMode": "cover",
                    "action": { "type": "uri", "uri": playLink }
                },
                "footer": {
                    "type": "box", "layout": "horizontal", "spacing": "md", "contents": [
                        {
                            "type": "button", "style": "primary", "color": "#ff0000", "height": "sm",
                            "action": { "type": "uri", "label": btnLabel, "uri": playLink }
                        },
                        {
                            "type": "button", "style": "secondary", "color": "#888888", "height": "sm",
                            "action": { "type": "uri", "label": "轉發分享", "uri": shareLink }
                        }
                    ]
                }
            }
        }];

        try {
            await liff.shareTargetPicker(flexMsg);
            liff.closeWindow();
        } catch (e) { alert("發送失敗"); }
    }
    window.onload = init;
</script>
</body>
</html>
